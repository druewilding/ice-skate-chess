<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ice Skate Chess</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="container">
    <h1>♔ Chess</h1>

    <div class="lobby">
      <div class="card">
        <h2>New Game</h2>
        <button id="btn-new-standard" class="btn btn-primary">Ice Skate Chess</button>
        <button id="btn-new-960" class="btn btn-secondary">Ice Skate Chess960</button>
        <!-- <button id="btn-new-limited" class="btn btn-secondary">Limited Range</button> -->
      </div>

      <div class="card">
        <h2>Join Game</h2>
        <div class="join-form">
          <input type="text" id="game-id-input" placeholder="Enter game code" maxlength="8" autocomplete="off">
          <button id="btn-join" class="btn btn-primary">Join</button>
        </div>
      </div>
    </div>

    <div id="error-message" class="error-message" hidden></div>

    <!-- Waiting screen shown after creating a game -->
    <!-- Removed: waiting is now handled inside game.html -->
  </div>

  <script type="module">
    import { ChessEngine } from './js/chess-engine.js';
    import { GameManager } from './js/game-manager.js';

    const gm = new GameManager();
    const engine = new ChessEngine({ iceskate: true });
    let initialized = false;

    async function ensureInit() {
      if (!initialized) {
        await gm.init();
        initialized = true;
      }
    }

    function showError(msg) {
      const el = document.getElementById('error-message');
      el.textContent = msg;
      el.hidden = false;
      setTimeout(() => { el.hidden = true; }, 5000);
    }

    // If the user arrives at index.html with a game hash, forward to game.html
    if (window.location.hash && window.location.hash.length > 1) {
      window.location.href = 'game.html' + window.location.hash;
    }

    // New standard game — go straight to game.html, no waiting screen here
    document.getElementById('btn-new-standard').addEventListener('click', async () => {
      try {
        await ensureInit();
        const gameId = await gm.createGame('standard');

        // Write the initial board state right away
        engine.reset();
        await gm.sendGameState(engine.serialize());

        // Record that this browser is white for this game
        localStorage.setItem('chess-color-' + gameId, 'white');

        // Navigate using hash so no server redirect can strip the game ID
        window.location.href = 'game.html#' + gameId;
      } catch (err) {
        showError('Failed to create game: ' + err.message);
      }
    });

    // New Chess960 + Ice Skate game
    document.getElementById('btn-new-960').addEventListener('click', async () => {
      try {
        await ensureInit();
        const gameId = await gm.createGame('iceskate-960');

        // Set up a randomised Chess960 back rank with ice skate rules
        engine.setup960();
        await gm.sendGameState(engine.serialize());

        localStorage.setItem('chess-color-' + gameId, 'white');
        window.location.href = 'game.html#' + gameId;
      } catch (err) {
        showError('Failed to create game: ' + err.message);
      }
    });

    // Join game
    document.getElementById('btn-join').addEventListener('click', async () => {
      const gameId = document.getElementById('game-id-input').value.trim().toLowerCase();
      if (!gameId) {
        showError('Please enter a game code');
        return;
      }
      try {
        await ensureInit();
        await gm.joinGame(gameId);
        localStorage.setItem('chess-color-' + gameId, 'black');
        window.location.href = 'game.html#' + gameId;
      } catch (err) {
        showError(err.message);
      }
    });

    // Allow Enter key in input
    document.getElementById('game-id-input').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') document.getElementById('btn-join').click();
    });
  </script>
</body>
</html>
